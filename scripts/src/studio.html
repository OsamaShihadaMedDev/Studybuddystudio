<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyBuddy QBank Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --bg-card:   rgba(255,255,255,0.03);
    --bg-input:  rgba(255,255,255,0.04);
    --bg-input-focus: rgba(255,255,255,0.06);
    --border:    rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text:      #e6edf3;
    --text-dim:  #8b949e;
    --text-faint:#6e7681;
    --teal:      #00b4d8;
    --teal-dim:  rgba(0,180,216,0.15);
    --green:     #00c896;
    --green-dim: rgba(0,200,150,0.15);
    --amber:     #f4a261;
    --amber-dim: rgba(244,162,97,0.15);
    --red:       #e5534b;
    --red-dim:   rgba(229,83,75,0.15);
    --mono:      'IBM Plex Mono', ui-monospace, Consolas, monospace;
    --sans:      'IBM Plex Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────────────────── */
  header.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  header.app-header .brand {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  header.app-header .brand .accent { color: var(--teal); }
  header.app-header .version {
    font-family: var(--mono);
    color: var(--text-faint);
    font-size: 12px;
  }

  /* ── Main layout ──────────────────────────────────────── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 60% 40%;
    gap: 0;
    overflow: hidden;
  }
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr; }
  }

  .form-col, .dash-col {
    padding: 20px 24px;
    overflow-y: auto;
    height: calc(100vh - 53px - var(--log-h, 40px));
  }
  .form-col { border-right: 1px solid var(--border); }

  /* ── Sections ─────────────────────────────────────────── */
  .section {
    margin-bottom: 24px;
    padding: 18px 18px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Form fields ─────────────────────────────────────── */
  label {
    display: block;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  input[type="text"], textarea, select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 8px 10px;
    border-radius: 0;
    outline: none;
    transition: border-color 80ms, background 80ms;
  }
  textarea {
    font-family: var(--mono);
    font-size: 13px;
    resize: vertical;
    min-height: 80px;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--teal);
    background: var(--bg-input-focus);
  }
  input.invalid, textarea.invalid { border-color: var(--red); }
  select {
    appearance: none; -webkit-appearance: none; cursor: pointer;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
      linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 28px;
  }

  .field-error {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
    min-height: 14px;
  }

  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 12px; }

  /* ── ID validation status ─────────────────────────────── */
  .id-status {
    font-family: var(--mono);
    font-size: 11.5px;
    margin-top: 6px;
    min-height: 16px;
    letter-spacing: 0.02em;
  }
  .id-status.ok { color: var(--green); }
  .id-status.exists { color: var(--red); }
  .id-status.invalid { color: var(--amber); }

  /* ── Option rows ─────────────────────────────────────── */
  .option-row {
    display: grid;
    grid-template-columns: 30px 1fr;
    gap: 10px;
    align-items: center;
    margin-bottom: 6px;
  }
  .option-letter {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--teal);
    text-align: center;
  }

  /* ── Paste sub-state ─────────────────────────────────── */
  .paste-area {
    width: 100%;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
    min-height: 260px;
  }
  .paste-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    gap: 12px;
  }
  .link-btn {
    background: transparent;
    border: none;
    color: var(--teal);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    padding: 6px 4px;
    text-transform: none;
  }
  .link-btn:hover:not(:disabled) { text-decoration: underline; filter: none; }

  /* ── Action buttons ──────────────────────────────────── */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 16px;
    border: 1px solid var(--teal);
    background: var(--teal);
    color: #0d1117;
    cursor: pointer;
    border-radius: 0;
    transition: background 80ms, color 80ms, border-color 80ms;
  }
  button.secondary { background: transparent; color: var(--teal); }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:disabled {
    background: rgba(255,255,255,0.04);
    color: var(--text-faint);
    border-color: var(--border);
    cursor: not-allowed;
  }
  button.success { background: var(--green); border-color: var(--green); color: #0d1117; }
  button.error   { background: var(--amber); border-color: var(--amber); color: #0d1117; }
  button.spinner::before {
    content: '';
    display: inline-block;
    width: 10px; height: 10px;
    margin-right: 8px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 700ms linear infinite;
    vertical-align: -1px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .new-question-row { margin-top: 14px; display: none; }
  .new-question-row.visible { display: block; }

  /* ── Dashboard ───────────────────────────────────────── */
  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .dash-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .refresh-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  .refresh-btn:hover { color: var(--teal); border-color: var(--teal); }

  .qtable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .qtable th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .qtable td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .qtable tr.qrow { cursor: pointer; transition: background 80ms; }
  .qtable tr.qrow:hover { background: rgba(255,255,255,0.02); }
  .qtable tr.qrow.expanded { background: rgba(0,180,216,0.04); }

  .qid { font-family: var(--mono); color: var(--teal); font-size: 12.5px; white-space: nowrap; }
  .qdomain { color: var(--text-dim); font-size: 12.5px; }
  .qtopic {
    color: var(--text);
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .qmedia { text-align: center; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid;
  }
  .badge.easy   { color: var(--green); border-color: var(--green); background: var(--green-dim); }
  .badge.medium { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
  .badge.hard   { color: var(--red);   border-color: var(--red);   background: var(--red-dim); }

  .qdetail {
    padding: 14px 16px 18px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .qdetail h4 {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 12px 0 6px;
  }
  .qdetail h4:first-child { margin-top: 0; }
  .qdetail .qtext { color: var(--text); margin-bottom: 8px; line-height: 1.55; }
  .qdetail .opt {
    padding: 5px 8px;
    margin-bottom: 3px;
    font-size: 12.5px;
    border-left: 2px solid transparent;
  }
  .qdetail .opt .letter { font-family: var(--mono); font-weight: 600; margin-right: 8px; color: var(--text-dim); }
  .qdetail .opt.correct { background: var(--teal-dim); border-left-color: var(--teal); }
  .qdetail .opt.correct .letter { color: var(--teal); }
  .qdetail .folder {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-faint);
    word-break: break-all;
  }
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
  }

  /* ── Log panel ───────────────────────────────────────── */
  .log-panel {
    border-top: 1px solid var(--border);
    background: #0a0e13;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    height: 40px;
    transition: height 120ms ease;
  }
  .log-panel.expanded { height: 220px; }
  .log-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    user-select: none;
    flex-shrink: 0;
  }
  .log-head .arrow { display: inline-block; width: 14px; }
  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 16px 12px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    display: none;
  }
  .log-panel.expanded .log-body { display: block; }
  .log-line { white-space: pre-wrap; word-break: break-word; }
  .log-line.ok   { color: var(--green); }
  .log-line.err  { color: var(--red); }
  .log-line.warn { color: var(--amber); }
  .log-line.dim  { color: var(--text-faint); }
  .clear-btn {
    background: transparent;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 3px 8px;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .clear-btn:hover { color: var(--teal); border-color: var(--teal); }

  /* ── Custom select (replaces all native <select>) ────── */
  .custom-select {
    position: relative;
    width: 100%;
    user-select: none;
  }
  .cs-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    cursor: pointer;
    transition: border-color 80ms, background 80ms;
  }
  .cs-trigger:hover,
  .custom-select.cs-open .cs-trigger {
    border-color: var(--teal);
    background: var(--bg-input-focus);
  }
  .cs-arrow {
    color: var(--text-dim);
    font-size: 11px;
    flex-shrink: 0;
    margin-left: 8px;
    transition: transform 120ms;
  }
  .custom-select.cs-open .cs-arrow { transform: rotate(180deg); }

  .cs-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    background: #161b22;
    border: 1px solid var(--border-strong);
    z-index: 200;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .custom-select.cs-open .cs-dropdown { display: block; }

  .cs-option {
    padding: 9px 12px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 60ms, color 60ms;
  }
  .cs-option:hover    { background: rgba(0,180,216,0.12); color: var(--teal); }
  .cs-option.cs-selected { background: var(--teal-dim); color: var(--teal); }

  /* ── Multi-file media slots ──────────────────────────── */
  .media-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .media-slot {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px;
    border: 1px dashed var(--border-strong);
    background: rgba(0,0,0,0.15);
    min-height: 120px;
  }
  .media-slot-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .media-file-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .media-file-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
  }
  .media-file-name {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--teal);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .media-file-type { min-width: 110px; }
  .media-file-remove {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    letter-spacing: 0;
    text-transform: none;
    transition: color 80ms, border-color 80ms;
  }
  .media-file-remove:hover { color: var(--red); border-color: var(--red); }
  .add-media-btn {
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 12px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: color 80ms, border-color 80ms;
    text-transform: none;
  }
  .add-media-btn:hover { color: var(--teal); border-color: var(--teal); }
  .media-add-row { margin-top: 4px; }

  /* ── Scrollbars ───────────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">▸ <span class="accent">StudyBuddy</span> QBank Studio</div>
  <div class="version">v1.0</div>
</header>

<main>
  <!-- ───────────── LEFT: FORM COLUMN ───────────── -->
  <section class="form-col">

    <!-- METADATA -->
    <div class="section">
      <h3 class="section-title">Metadata</h3>
      <div class="grid-4">

        <!-- Subject -->
        <div class="field">
          <label>Subject</label>
          <input type="hidden" id="f-subject" value="">
          <div class="custom-select" id="cs-subject">
            <div class="cs-trigger">
              <span class="cs-value">—</span>
              <span class="cs-arrow">▾</span>
            </div>
            <div class="cs-dropdown"></div>
          </div>
          <div class="field-error" data-error-for="subject"></div>
        </div>

        <!-- Domain -->
        <div class="field">
          <label>Domain</label>
          <input type="hidden" id="f-domain" value="">
          <div class="custom-select" id="cs-domain">
            <div class="cs-trigger">
              <span class="cs-value">—</span>
              <span class="cs-arrow">▾</span>
            </div>
            <div class="cs-dropdown"></div>
          </div>
          <div class="field-error" data-error-for="domain"></div>
        </div>

        <!-- Difficulty -->
        <div class="field">
          <label>Difficulty</label>
          <input type="hidden" id="f-difficulty" value="Medium">
          <div class="custom-select" id="cs-difficulty">
            <div class="cs-trigger">
              <span class="cs-value">Medium</span>
              <span class="cs-arrow">▾</span>
            </div>
            <div class="cs-dropdown"></div>
          </div>
        </div>

        <!-- Reasoning Order -->
        <div class="field">
          <label>Reasoning Order</label>
          <input type="hidden" id="f-reasoning" value="2nd">
          <div class="custom-select" id="cs-reasoning">
            <div class="cs-trigger">
              <span class="cs-value">2nd</span>
              <span class="cs-arrow">▾</span>
            </div>
            <div class="cs-dropdown"></div>
          </div>
        </div>

      </div>

      <div class="grid-2">
        <!-- External ID -->
        <div class="field">
          <label for="f-id">External ID</label>
          <input id="f-id" type="text" placeholder="Auto-filled on subject/domain select" autocomplete="off">
          <div class="id-status" id="id-status"></div>
        </div>

        <!-- Competency -->
        <div class="field">
          <label>Competency</label>
          <input type="hidden" id="f-competency" value="Foundational Science">
          <div class="custom-select" id="cs-competency">
            <div class="cs-trigger">
              <span class="cs-value">Foundational Science</span>
              <span class="cs-arrow">▾</span>
            </div>
            <div class="cs-dropdown"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- QUESTION (two sub-states) -->
    <div class="section">
      <h3 class="section-title">Question</h3>

      <!-- Sub-state A: paste -->
      <div id="questionPasteState">
        <textarea id="questionPasteArea" class="paste-area" rows="12"
          placeholder="Paste full question text from v6 prompt here (vignette, options, explanation, teaching point)…"></textarea>
        <div class="paste-actions">
          <button id="parseBtn">Parse</button>
          <button id="goManualBtn" class="link-btn">Enter manually →</button>
        </div>
      </div>

      <!-- Sub-state B: edit -->
      <div id="questionEditState" style="display:none">
        <div class="field">
          <label for="topic">Topic</label>
          <input id="topic" type="text" autocomplete="off">
          <div class="field-error" data-error-for="topic"></div>
        </div>

        <div class="field">
          <label for="questionText">Question Text</label>
          <textarea id="questionText" rows="6"></textarea>
          <div class="field-error" data-error-for="question_text"></div>
        </div>

        <div class="field">
          <label>Options</label>
          <div class="option-row"><div class="option-letter">A</div><input id="optionA" type="text"></div>
          <div class="option-row"><div class="option-letter">B</div><input id="optionB" type="text"></div>
          <div class="option-row"><div class="option-letter">C</div><input id="optionC" type="text"></div>
          <div class="option-row"><div class="option-letter">D</div><input id="optionD" type="text"></div>
          <div class="option-row"><div class="option-letter">E</div><input id="optionE" type="text"></div>
          <div class="field-error" data-error-for="options"></div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="correctOption">Correct Answer</label>
            <select id="correctOption">
              <option value="a">a</option><option value="b">b</option>
              <option value="c">c</option><option value="d">d</option>
              <option value="e">e</option>
            </select>
          </div>
          <div class="field">
            <label for="teachingPoint">Teaching Point</label>
            <input id="teachingPoint" type="text">
            <div class="field-error" data-error-for="teaching_point"></div>
          </div>
        </div>

        <div class="field">
          <label for="explanation">Explanation</label>
          <textarea id="explanation" rows="8"></textarea>
          <div class="field-error" data-error-for="explanation"></div>
        </div>

        <div style="margin-top:8px">
          <button id="repasteBtn" class="link-btn">↩ Re-paste</button>
        </div>
      </div>
    </div>

    <!-- MEDIA -->
    <div class="section">
      <h3 class="section-title">Media</h3>
      <div class="media-row">

        <div class="media-slot" id="stemSlot" data-context="stem">
          <div class="media-slot-label">Stem Images</div>
          <div class="media-file-list" id="stemFileList"></div>
          <div class="media-add-row">
            <button type="button" class="add-media-btn" id="addStemBtn">+ Add Stem Image</button>
            <input type="file" id="stemFileInput" accept="image/*" hidden multiple>
          </div>
        </div>

        <div class="media-slot" id="explanationSlot" data-context="explanation">
          <div class="media-slot-label">Explanation Images</div>
          <div class="media-file-list" id="explanationFileList"></div>
          <div class="media-add-row">
            <button type="button" class="add-media-btn" id="addExplanationBtn">+ Add Explanation Image</button>
            <input type="file" id="explanationFileInput" accept="image/*" hidden multiple>
          </div>
        </div>

      </div>
    </div>

    <!-- ACTIONS -->
    <div class="section">
      <h3 class="section-title">Actions</h3>
      <div class="actions">
        <button id="btn-create">Create Files</button>
        <button id="btn-push" class="secondary" disabled>Push to Supabase</button>
      </div>
      <div class="new-question-row" id="new-q-row">
        <button id="btn-new" class="secondary" style="width:100%">+ New Question</button>
      </div>
    </div>

  </section>

  <!-- ───────────── RIGHT: DASHBOARD ───────────── -->
  <section class="dash-col">
    <div class="dash-header">
      <div class="dash-title">Recent Questions</div>
      <button class="refresh-btn" id="btn-refresh">↻ Refresh</button>
    </div>
    <div id="dash-content">
      <div class="empty-state">Loading…</div>
    </div>
  </section>
</main>

<!-- ───────────── LOG PANEL ───────────── -->
<div class="log-panel" id="log-panel">
  <div class="log-head" id="log-head">
    <span><span class="arrow">▶</span> LOG</span>
    <button class="clear-btn" id="btn-clear-log">Clear</button>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<script>
(() => {
  const state = {
    config: null,
    lastScaffoldedPath: null,
    expandedId: null,
    mediaFiles: { stem: [], explanation: [] },
    // mediaFiles[context] = array of { file: File, get typeToken(): string, row: HTMLElement }
  };

  const $  = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  const FIELDS = {
    external_id:     '#f-id',
    subject:         '#f-subject',
    domain:          '#f-domain',
    difficulty:      '#f-difficulty',
    reasoning_order: '#f-reasoning',
    competency:      '#f-competency',
    topic:           '#topic',
    question_text:   '#questionText',
    option_a:        '#optionA',
    option_b:        '#optionB',
    option_c:        '#optionC',
    option_d:        '#optionD',
    option_e:        '#optionE',
    correct_option:  '#correctOption',
    explanation:     '#explanation',
    teaching_point:  '#teachingPoint',
  };

  const TYPE_TOKENS = ['diagram', 'ecg', 'histology', 'xray', 'action_pot', 'pv_loop'];

  // ── Log panel ──
  const logPanel = $('#log-panel');
  const logBody  = $('#log-body');
  const logHead  = $('#log-head');
  const logArrow = logHead.querySelector('.arrow');

  function setLogExpanded(expanded) {
    logPanel.classList.toggle('expanded', expanded);
    logArrow.textContent = expanded ? '▼' : '▶';
  }
  logHead.addEventListener('click', (e) => {
    if (e.target.id === 'btn-clear-log') return;
    setLogExpanded(!logPanel.classList.contains('expanded'));
  });
  $('#btn-clear-log').addEventListener('click', (e) => {
    e.stopPropagation();
    logBody.innerHTML = '';
  });
  function appendLog(line, cls = '') {
    const div = document.createElement('div');
    div.className = 'log-line ' + cls;
    div.textContent = line;
    logBody.appendChild(div);
    logBody.scrollTop = logBody.scrollHeight;
    if (!logPanel.classList.contains('expanded')) setLogExpanded(true);
  }
  function classifyLine(line) {
    if (/✓|✦|complete/i.test(line)) return 'ok';
    if (/✗|failed|error/i.test(line)) return 'err';
    if (/⏭|skipped|warn/i.test(line)) return 'warn';
    if (/DEBUG/.test(line)) return 'dim';
    return '';
  }

  // ── Question sub-state switching ──
  function showQuestionPasteState() {
    $('#questionPasteState').style.display = 'block';
    $('#questionEditState').style.display  = 'none';
  }
  function showQuestionEditState() {
    $('#questionPasteState').style.display = 'none';
    $('#questionEditState').style.display  = 'block';
  }
  function clearQuestionEditFields() {
    ['topic','questionText','optionA','optionB','optionC','optionD','optionE','teachingPoint','explanation']
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    $('#correctOption').value = 'a';
  }

  $('#goManualBtn').addEventListener('click', () => {
    clearQuestionEditFields();
    showQuestionEditState();
  });
  $('#repasteBtn').addEventListener('click', () => {
    clearQuestionEditFields();
    $('#questionPasteArea').value = '';
    showQuestionPasteState();
  });

  // ── Parse ──
  $('#parseBtn').addEventListener('click', parseQuestionSection);
  async function parseQuestionSection() {
    const text = $('#questionPasteArea').value.trim();
    if (!text) { appendLog('✗ Paste area is empty', 'err'); return; }

    const btn = $('#parseBtn');
    btn.textContent = 'Parsing…';
    btn.disabled = true;
    btn.classList.add('spinner');
    appendLog('▶ Parsing question section…');

    try {
      const res = await fetch('/api/parse-question', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || 'Parse failed');

      const p = data.parsed;
      $('#topic').value          = p.topic          ?? '';
      $('#questionText').value   = p.question_text  ?? '';
      $('#optionA').value        = p.option_a       ?? '';
      $('#optionB').value        = p.option_b       ?? '';
      $('#optionC').value        = p.option_c       ?? '';
      $('#optionD').value        = p.option_d       ?? '';
      $('#optionE').value        = p.option_e       ?? '';
      $('#correctOption').value  = (p.correct_option || 'a').toLowerCase();
      $('#teachingPoint').value  = p.teaching_point ?? '';
      $('#explanation').value    = p.explanation    ?? '';

      appendLog('✓ Question fields populated — review and edit as needed.', 'ok');
      showQuestionEditState();
    } catch (err) {
      appendLog(`✗ Parse error: ${err.message}`, 'err');
    } finally {
      btn.textContent = 'Parse';
      btn.disabled = false;
      btn.classList.remove('spinner');
    }
  }

  // ── Custom select system ──
  function csInit(wrapperId, options, initialValue, onChange) {
    const wrapper  = document.getElementById(wrapperId);
    const trigger  = wrapper.querySelector('.cs-trigger');
    const valueEl  = wrapper.querySelector('.cs-value');
    const dropdown = wrapper.querySelector('.cs-dropdown');

    function setValue(val, label) {
      valueEl.textContent = label ?? val;
      const hidden = wrapper.closest('.field')?.querySelector('input[type="hidden"]');
      if (hidden) hidden.value = val;
      dropdown.querySelectorAll('.cs-option').forEach(o => {
        o.classList.toggle('cs-selected', o.dataset.value === val);
      });
      if (onChange) onChange(val);
    }

    function buildOptions(opts) {
      dropdown.innerHTML = '';
      opts.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'cs-option';
        div.dataset.value = opt.value;
        div.textContent = opt.label ?? opt.value;
        div.addEventListener('mousedown', (e) => {
          e.preventDefault();
          setValue(opt.value, opt.label ?? opt.value);
          wrapper.classList.remove('cs-open');
        });
        dropdown.appendChild(div);
      });
    }

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = wrapper.classList.contains('cs-open');
      document.querySelectorAll('.custom-select.cs-open').forEach(el => el.classList.remove('cs-open'));
      if (!isOpen) wrapper.classList.add('cs-open');
    });

    buildOptions(options);
    setValue(initialValue, options.find(o => o.value === initialValue)?.label ?? initialValue);

    wrapper._rebuild = (opts, newVal) => {
      buildOptions(opts);
      setValue(newVal, opts.find(o => o.value === newVal)?.label ?? newVal);
    };
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.custom-select.cs-open').forEach(el => el.classList.remove('cs-open'));
  });

  async function loadConfig() {
    const res    = await fetch('/api/config');
    state.config = await res.json();

    const subjects = state.config.subjects;
    const subjectOpts = subjects.map(s => ({ value: s.name, label: s.name }));

    csInit('cs-subject', subjectOpts, subjects[0].name, (val) => {
      rebuildDomains(val);
      fetchNextId();
    });

    csInit('cs-difficulty', [
      { value: 'Easy',   label: 'Easy'   },
      { value: 'Medium', label: 'Medium' },
      { value: 'Hard',   label: 'Hard'   },
    ], 'Medium', null);

    csInit('cs-reasoning', [
      { value: '1st', label: '1st' },
      { value: '2nd', label: '2nd' },
      { value: '3rd', label: '3rd' },
    ], '2nd', null);

    csInit('cs-competency', [
      { value: 'Foundational Science',         label: 'Foundational Science'         },
      { value: 'Diagnosis – H&P',              label: 'Diagnosis – H&P'              },
      { value: 'Diagnosis – Formulating',      label: 'Diagnosis – Formulating'      },
      { value: 'Management – Pharmacotherapy', label: 'Management – Pharmacotherapy' },
    ], 'Foundational Science', null);

    rebuildDomains(subjects[0].name);
  }

  function rebuildDomains(subjectName) {
    const subject = state.config.subjects.find(s => s.name === subjectName);
    if (!subject) return;
    const domainOpts = subject.domains.map(d => ({ value: d.name, label: d.name }));
    const csdom = document.getElementById('cs-domain');
    if (csdom && csdom._rebuild) {
      csdom._rebuild(domainOpts, domainOpts[0].value);
      const hidden = document.getElementById('f-domain');
      if (hidden) hidden.value = domainOpts[0].value;
    } else {
      csInit('cs-domain', domainOpts, domainOpts[0].value, () => {
        validateId();
        fetchNextId();
      });
    }
    validateId();
    fetchNextId();
  }

  // ── Auto-ID ──
  async function fetchNextId() {
    const subject = document.getElementById('f-subject')?.value;
    const domain  = document.getElementById('f-domain')?.value;
    if (!subject || !domain) return;
    try {
      const res  = await fetch(`/api/next-id?subject=${encodeURIComponent(subject)}&domain=${encodeURIComponent(domain)}`);
      const data = await res.json();
      if (data.nextId) {
        const idField = document.getElementById('f-id');
        if (!idField.value || idField.dataset.autoFilled === 'true') {
          idField.value = data.nextId;
          idField.dataset.autoFilled = 'true';
          validateId();
        }
      }
    } catch { /* silently fail */ }
  }

  // ── ID validation ──
  let validateTimer = null;
  async function validateId() {
    const id = $('#f-id').value.trim();
    const subject = $('#f-subject').value;
    const domain  = $('#f-domain').value;
    const status = $('#id-status');
    status.textContent = '';
    status.className = 'id-status';
    if (!id) return;
    try {
      const url = `/api/validate-id?id=${encodeURIComponent(id)}&subject=${encodeURIComponent(subject)}&domain=${encodeURIComponent(domain)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.valid) { status.classList.add('invalid'); status.textContent = '⚠ ' + data.message; return; }
      if (data.exists) { status.classList.add('exists');  status.textContent = '✗ ' + data.message; return; }
      status.classList.add('ok'); status.textContent = '✓ ' + data.message;
    } catch (err) {
      status.classList.add('invalid'); status.textContent = '⚠ ' + err.message;
    }
  }
  $('#f-id').addEventListener('blur', validateId);
  $('#f-id').addEventListener('input', () => {
    $('#f-id').dataset.autoFilled = 'false';
    clearTimeout(validateTimer);
    validateTimer = setTimeout(validateId, 400);
  });

  // ── Multi-file media system ──
  function addMediaFile(context, file) {
    const listEl = document.getElementById(context === 'stem' ? 'stemFileList' : 'explanationFileList');

    const row = document.createElement('div');
    row.className = 'media-file-row';

    const nameEl = document.createElement('div');
    nameEl.className = 'media-file-name';
    nameEl.title = file.name;
    nameEl.textContent = file.name;

    const typeWrapper = document.createElement('div');
    typeWrapper.className = 'custom-select media-file-type';
    typeWrapper.innerHTML = `
      <div class="cs-trigger" style="padding:5px 8px;font-size:12px;">
        <span class="cs-value">diagram</span>
        <span class="cs-arrow">▾</span>
      </div>
      <div class="cs-dropdown"></div>
    `;

    const innerDropdown = typeWrapper.querySelector('.cs-dropdown');
    const innerValue    = typeWrapper.querySelector('.cs-value');
    let selectedType    = 'diagram';

    function updateRowFilename() {
      const ext = (file.name.match(/\.[^.]+$/) || ['.png'])[0];
      nameEl.textContent = `${context}.${selectedType}${ext}`;
      nameEl.title = `${context}.${selectedType}${ext} (original: ${file.name})`;
    }

    TYPE_TOKENS.forEach(token => {
      const opt = document.createElement('div');
      opt.className = 'cs-option' + (token === 'diagram' ? ' cs-selected' : '');
      opt.dataset.value = token;
      opt.textContent = token;
      opt.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectedType = token;
        innerValue.textContent = token;
        innerDropdown.querySelectorAll('.cs-option').forEach(o =>
          o.classList.toggle('cs-selected', o.dataset.value === token)
        );
        typeWrapper.classList.remove('cs-open');
        updateRowFilename();
      });
      innerDropdown.appendChild(opt);
    });

    typeWrapper.querySelector('.cs-trigger').addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = typeWrapper.classList.contains('cs-open');
      document.querySelectorAll('.custom-select.cs-open').forEach(el => el.classList.remove('cs-open'));
      if (!isOpen) typeWrapper.classList.add('cs-open');
    });

    updateRowFilename();

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'media-file-remove';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => {
      const idx = state.mediaFiles[context].findIndex(m => m.row === row);
      if (idx !== -1) state.mediaFiles[context].splice(idx, 1);
      row.remove();
    });

    row.appendChild(nameEl);
    row.appendChild(typeWrapper);
    row.appendChild(removeBtn);
    listEl.appendChild(row);

    const entry = { file, get typeToken() { return selectedType; }, row };
    state.mediaFiles[context].push(entry);
  }

  document.getElementById('addStemBtn').addEventListener('click', () => {
    document.getElementById('stemFileInput').click();
  });
  document.getElementById('addExplanationBtn').addEventListener('click', () => {
    document.getElementById('explanationFileInput').click();
  });
  document.getElementById('stemFileInput').addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(f => addMediaFile('stem', f));
    e.target.value = '';
  });
  document.getElementById('explanationFileInput').addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(f => addMediaFile('explanation', f));
    e.target.value = '';
  });

  // ── Read fields + validate ──
  function getAllFields() {
    const out = {};
    for (const [k, sel] of Object.entries(FIELDS)) {
      const el = $(sel);
      out[k] = (el?.value || '').trim();
    }
    return out;
  }
  const REQUIRED_FIELDS = [
    'subject','domain','topic','question_text',
    'option_a','option_b','option_c','option_d','option_e',
    'explanation','teaching_point',
  ];
  function clearErrors() {
    $$('.field-error').forEach(el => el.textContent = '');
    $$('input.invalid, textarea.invalid').forEach(el => el.classList.remove('invalid'));
  }
  function validateForm() {
    clearErrors();
    const data = getAllFields();
    const missing = [];
    REQUIRED_FIELDS.forEach(k => {
      if (!data[k]) {
        missing.push(k);
        const el = $(FIELDS[k]);
        if (el) el.classList.add('invalid');
        const errEl = document.querySelector(`[data-error-for="${k.startsWith('option_') ? 'options' : k}"]`);
        if (errEl && !errEl.textContent) errEl.textContent = 'Required';
      }
    });
    if (!/^[A-Z]{2}-[A-Z]{2,6}-\d{3}$/.test(data.external_id)) {
      missing.push('external_id');
      $(FIELDS.external_id).classList.add('invalid');
    }
    return missing;
  }

  // ── Buttons ──
  const btnCreate = $('#btn-create');
  const btnPush   = $('#btn-push');
  const newRow    = $('#new-q-row');

  function resetButtons() {
    btnCreate.className = '';
    btnCreate.textContent = 'Create Files';
    btnCreate.disabled = false;
    btnPush.className = 'secondary';
    btnPush.textContent = 'Push to Supabase';
    btnPush.disabled = true;
    newRow.classList.remove('visible');
  }
  function resetAll() {
    Object.values(FIELDS).forEach(sel => {
      const el = $(sel);
      if (!el) return;
      if (el.tagName === 'SELECT') el.selectedIndex = 0;
      else el.value = '';
    });
    const firstSubject = state.config?.subjects?.[0];
    if (firstSubject) {
      const cssub = document.getElementById('cs-subject');
      if (cssub?._rebuild) {
        const subjectOpts = state.config.subjects.map(s => ({ value: s.name, label: s.name }));
        cssub._rebuild(subjectOpts, firstSubject.name);
      }
      $('#f-subject').value = firstSubject.name;
      rebuildDomains(firstSubject.name);
    }
    state.mediaFiles = { stem: [], explanation: [] };
    document.getElementById('stemFileList').innerHTML = '';
    document.getElementById('explanationFileList').innerHTML = '';
    $('#id-status').textContent = '';
    clearErrors();
    state.lastScaffoldedPath = null;
    resetButtons();
    $('#questionPasteArea').value = '';
    showQuestionPasteState();
    $('#f-id').dataset.autoFilled = 'true';
    fetchNextId();
  }

  btnCreate.addEventListener('click', async () => {
    const missing = validateForm();
    if (missing.length) {
      appendLog(`✗ Validation failed: ${missing.join(', ')}`, 'err');
      return;
    }
    btnCreate.disabled = true;
    btnCreate.textContent = 'Creating…';
    const data = getAllFields();
    const fd = new FormData();
    Object.entries(data).forEach(([k, v]) => fd.append(k, v));
    state.mediaFiles.stem.forEach((entry, i) => {
      fd.append('stemMedia', entry.file);
      fd.append(`stemType_${i}`, entry.typeToken);
      fd.append(`stemMediaDescription_${i}`, '');
    });
    state.mediaFiles.explanation.forEach((entry, i) => {
      fd.append('explanationMedia', entry.file);
      fd.append(`explanationType_${i}`, entry.typeToken);
      fd.append(`explanationMediaDescription_${i}`, '');
    });

    try {
      const res = await fetch('/api/scaffold', { method: 'POST', body: fd });
      const result = await res.json();
      if (!result.success) throw new Error(result.error || 'Scaffold failed');
      state.lastScaffoldedPath = result.folderPath;
      btnCreate.className = 'success';
      btnCreate.textContent = '✓ Files Created';
      btnPush.disabled = false;
      btnPush.className = '';
      appendLog(`✓ Scaffold created: ${result.relativeFolderPath}`, 'ok');
      result.files.forEach(f => appendLog(`  · ${f}`, 'dim'));
    } catch (err) {
      btnCreate.disabled = false;
      btnCreate.className = 'error';
      btnCreate.textContent = 'Create Files';
      appendLog(`✗ ${err.message}`, 'err');
    }
  });

  btnPush.addEventListener('click', async () => {
    if (!state.lastScaffoldedPath) return;
    btnPush.disabled = true;
    btnPush.textContent = 'Pushing…';
    appendLog(`▶ Ingesting ${state.lastScaffoldedPath}`, '');
    try {
      const res = await fetch('/api/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folderPath: state.lastScaffoldedPath }),
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let hadError = false;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.trim()) continue;
          if (/DEBUG/.test(line)) continue;
          appendLog(line, classifyLine(line));
          if (/✗|failed|error/i.test(line)) hadError = true;
        }
      }
      if (buffer.trim() && !/DEBUG/.test(buffer)) appendLog(buffer, classifyLine(buffer));

      if (hadError) {
        btnPush.className = 'error';
        btnPush.textContent = '✗ Failed';
        btnPush.disabled = false;
      } else {
        btnPush.className = 'success';
        btnPush.textContent = '✓ Ingested';
        state.lastScaffoldedPath = null;
        newRow.classList.add('visible');
        loadQuestions();
      }
    } catch (err) {
      btnPush.className = 'error';
      btnPush.textContent = '✗ Failed';
      btnPush.disabled = false;
      appendLog(`✗ ${err.message}`, 'err');
    }
  });

  $('#btn-new').addEventListener('click', resetAll);

  // ── Dashboard ──
  function renderDashboard(questions) {
    const root = $('#dash-content');
    if (!questions.length) {
      root.innerHTML = `<div class="empty-state">No questions ingested yet.<br>Create your first question using the form.</div>`;
      return;
    }
    const table = document.createElement('table');
    table.className = 'qtable';
    table.innerHTML = `<thead><tr>
      <th>ID</th><th>Domain</th><th>Difficulty</th><th>Media</th><th>Topic</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    questions.forEach(q => {
      const tr = document.createElement('tr');
      tr.className = 'qrow';
      tr.dataset.id = q.external_id;
      const diffCls = (q.difficulty || '').toLowerCase();
      const topic = (q.topic || '').length > 40 ? q.topic.slice(0, 40) + '…' : (q.topic || '');
      tr.innerHTML = `
        <td class="qid">${q.external_id}</td>
        <td class="qdomain">${q.domain || ''}</td>
        <td><span class="badge ${diffCls}">${q.difficulty || ''}</span></td>
        <td class="qmedia">${q.has_media ? '🖼' : ''}</td>
        <td class="qtopic" title="${escapeHtml(q.topic || '')}">${escapeHtml(topic)}</td>
      `;
      tr.addEventListener('click', () => toggleRow(q, tr));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    root.innerHTML = '';
    root.appendChild(table);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function toggleRow(q, tr) {
    const next = tr.nextElementSibling;
    if (next && next.classList.contains('qdetail-row')) {
      next.remove();
      tr.classList.remove('expanded');
      state.expandedId = null;
      return;
    }
    document.querySelectorAll('.qdetail-row').forEach(n => n.remove());
    document.querySelectorAll('tr.qrow.expanded').forEach(n => n.classList.remove('expanded'));
    const detail = document.createElement('tr');
    detail.className = 'qdetail-row';
    const td = document.createElement('td');
    td.colSpan = 5;
    td.className = 'qdetail';
    const opts = ['a','b','c','d','e'].map(L => {
      const text = q['option_' + L] || '';
      const isCorrect = q.correct_option === L;
      return `<div class="opt ${isCorrect ? 'correct' : ''}"><span class="letter">${L.toUpperCase()}</span>${escapeHtml(text)}</div>`;
    }).join('');
    td.innerHTML = `
      <h4>Question</h4>
      <div class="qtext">${escapeHtml(q.question_text || '')}</div>
      <h4>Options (correct = ${q.correct_option})</h4>
      ${opts}
      <h4>Folder</h4>
      <div class="folder">${escapeHtml(q.folder || '')}</div>
    `;
    detail.appendChild(td);
    tr.parentNode.insertBefore(detail, tr.nextSibling);
    tr.classList.add('expanded');
    state.expandedId = q.external_id;
  }
  async function loadQuestions() {
    try {
      const res = await fetch('/api/questions');
      const data = await res.json();
      renderDashboard(data);
    } catch (err) {
      $('#dash-content').innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
    }
  }
  $('#btn-refresh').addEventListener('click', loadQuestions);

  // ── Init ──
  loadConfig().then(loadQuestions).catch(err => {
    appendLog(`✗ Init failed: ${err.message}`, 'err');
  });
})();
</script>
</body>
</html>
